<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEMANT VERMA ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff1744,#ff4081,#ff80ab,#ffcdd2);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
    font-family:Arial, sans-serif;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(255,255,255,0.4);
    color:white;
    max-width:700px;
}

.name{
    font-size:5rem;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:8px;
    color:white;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #ff1744,
        0 0 80px #ff1744;
    animation:glow 2s infinite alternate;
    margin-bottom:15px;
}

@keyframes glow{
    from{
        text-shadow:
            0 0 10px #fff,
            0 0 20px #ff1744,
            0 0 40px #ff1744;
    }
    to{
        text-shadow:
            0 0 20px #fff,
            0 0 40px #ff1744,
            0 0 80px #ff1744,
            0 0 120px #ff1744;
    }
}

h2{
    font-size:2rem;
    margin-bottom:15px;
}

p{
    font-size:1.3rem;
    line-height:1.6;
}

button{
    margin-top:25px;
    padding:12px 28px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    margin-left:10px;
    margin-right:10px;
}

.yes{
    background:white;
    color:#ff1744;
    font-weight:bold;
}

.no{
    background:#333;
    color:white;
}

#message{
    margin-top:25px;
    font-size:1.8rem;
    font-weight:bold;
}

.heart{
    position:absolute;
    font-size:25px;
    animation:float 8s linear forwards;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="name">HEMANT VERMA</div>

    <h2>❤️ A Special Message ❤️</h2>

    <p>
        Every day feels brighter because of you ✨<br>
        Your smile makes my heart happy 💖<br><br>
        Will you make my world complete? ❤️
    </p>

    <button class="yes" onclick="acceptLove()">YES 💕</button>
    <button class="no" id="noBtn">NO 😜</button>

    <div id="message"></div>

</div>

<script>

function acceptLove(){
    document.getElementById("message").innerHTML =
    "❤️ THANK YOU! YOU MADE MY DAY ❤️";

    for(let i=0;i<80;i++){
        createHeart(true);
    }
}

const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
    noBtn.style.position="absolute";
    noBtn.style.left=Math.random()*80+"%";
    noBtn.style.top=Math.random()*80+"%";
});

function createHeart(big=false){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(big?20+Math.random()*40:15+Math.random()*20)+"px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(()=>{
    createHeart();
},300);

</script>

</body>
</html>
